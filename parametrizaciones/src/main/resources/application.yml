server:
  port: 8083

spring:
  application:
    name: parametrizaciones
  
  datasource:
    url: jdbc:mysql://localhost:3306/parametrizaciones_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/api/auth/jwks

logging:
  level:
    com.allianceever.parametrizaciones: DEBUG
    org.springframework.security: INFO
    org.springframework.amqp: INFO
