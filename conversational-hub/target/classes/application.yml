server:
  port: 8090

spring:
  application:
    name: conversational-hub
  datasource:
    url: jdbc:postgresql://localhost:5432/iam_db
    username: ${DB_USERNAME:iam_user}
    password: ${DB_PASSWORD:iam_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_hub_schema_history
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: iam-core
          jwk-set-uri: http://localhost:8081/api/auth/jwks

logging:
  level:
    com.conversationalhub: DEBUG
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  iam:
    base-url: http://localhost:8081
