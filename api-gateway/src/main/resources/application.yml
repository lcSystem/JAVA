server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 15s
      routes:
        # Creditos Web - Credit Management
        - id: creditos-web
          uri: http://localhost:8082
          predicates:
            - Path=/api/creditos/**, /api/credit-types/**, /api/credit-requests/**, /api/applicants/**, /api/creditos-portfolio/**

        # Parametrizaciones - Parameter Management
        - id: parametrizaciones
          uri: http://localhost:8083
          predicates:
            - Path=/api/parametrizaciones/**, /api/parameters/**

        # Portfolio Service - File & Fold
        - id: portfolio-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/portfolio/**, /api/folders/**, /api/files/**

        # Reportes Service - Report Generation
        - id: reportes-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/reportes/**, /api/reports/**, /api/v1/dynamic-reports/**

        # Conversational Hub - Chat & AI
        - id: conversational-hub
          uri: http://localhost:8090
          predicates:
            - Path=/api/chat/**, /api/conversational-hub/**

        # Conversational Hub WebSockets
        - id: conversational-hub-ws
          uri: ws://localhost:8090
          predicates:
            - Path=/ws/**

        # Notification Service - System Alerts
        - id: notification-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/notifications/**

        # Customer Service - Customer Management
        - id: customer-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/customers, /api/customers/**

        # IAM Core - Catch-all for Identity, Auth and static assets
        - id: iam-core
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/users/**, /api/roles/**, /api/permissions/**, /api/menus/**, /api/design/**, /api/organizations/**, /api/sessions/**, /api/security/**, /uploads/**, /assets/**, /api/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Vary, RETAIN_UNIQUE

      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:3000"
              - "http://localhost:5500"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true
    gateway:
      enabled: true
