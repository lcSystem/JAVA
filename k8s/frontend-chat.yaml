apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-chat-deployment
  namespace: erp-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-chat
  template:
    metadata:
      labels:
        app: frontend-chat
    spec:
      containers:
      - name: frontend-chat
        image: conversational-hub-flutter:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-chat-service
  namespace: erp-namespace
spec:
  selector:
    app: frontend-chat
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
