    spec:
      containers:
      - name: creditos-service
        image: creditos-web:latest
        ports:
        - containerPort: 8082
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "384Mi"
            cpu: "1000m"
        livenessProbe:
