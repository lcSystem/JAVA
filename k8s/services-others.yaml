apiVersion: apps/v1
kind: Deployment
metadata:
  name: params-deployment
  namespace: erp-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: params-service
  template:
    metadata:
      labels:
        app: params-service
    spec:
      containers:
      - name: params-service
        image: parametrizaciones:latest
        ports:
        - containerPort: 8083
        resources:
          requests:
            memory: "384Mi"
            cpu: "100m"
          limits:
            memory: "768Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8083
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8083
          initialDelaySeconds: 70
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: erp-config
        - secretRef:
            name: erp-secrets
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/parametrizaciones_db?createDatabaseIfNotExist=true"
---
apiVersion: v1
kind: Service
metadata:
  name: params-service
  namespace: erp-namespace
spec:
  selector:
    app: params-service
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083
---
