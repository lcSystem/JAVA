apiVersion: apps/v1
kind: Deployment
metadata:
  name: reportes-deployment
  namespace: erp-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reportes-service
  template:
    metadata:
      labels:
        app: reportes-service
    spec:
      containers:
      - name: reportes-service
