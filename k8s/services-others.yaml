        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/db_reportes?createDatabaseIfNotExist=true"
---
apiVersion: v1
kind: Service
metadata:
  name: reportes-service
  namespace: erp-namespace
spec:
