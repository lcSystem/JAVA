apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversational-hub-deployment
  namespace: erp-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conversational-hub
  template:
    metadata:
      labels:
        app: conversational-hub
    spec:
      containers:
      - name: conversational-hub
        image: conversational-hub:latest
        ports:
        - containerPort: 8090
        resources:
          requests:
            memory: "384Mi"
            cpu: "100m"
          limits:
            memory: "768Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8090
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8090
          initialDelaySeconds: 70
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: erp-config
        - secretRef:
            name: erp-secrets
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-service:5432/db_conversational_hub"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: erp-secrets
              key: POSTGRES_PASSWORD
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-service"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: conversational-hub-service
  namespace: erp-namespace
spec:
  selector:
    app: conversational-hub
  ports:
    - protocol: TCP
      port: 8090
      targetPort: 8090
