server:
  port: 8091

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/erp_notifications?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASS:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  application:
    name: notification-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  security:
    oauth2:
      resourceserver:
#        jwt:
#          issuer-uri: http://localhost:8081
#          jwk-set-uri: http://localhost:8081/api/auth/jwks (Now handled in SecurityConfig.java)

logging:
  level:
    com.notifications: DEBUG

monitoring:
  check-interval: 30000
  services:
    - name: creditos-web
      url: http://localhost:8081/actuator/health
    - name: "Parametrizaciones"
      url: "http://localhost:8083/actuator/health"
    - name: "Portfolio Service"
      url: "http://localhost:8084/actuator/health"
    - name: "Reportes Service"
      url: "http://localhost:8085/actuator/health"
    - name: "Conversational Hub"
      url: "http://localhost:8090/actuator/health"
    - name: "IAM Core"
      url: "http://localhost:8081/actuator/health"
    - name: "API Gateway"
      url: "http://localhost:8080/actuator/health"
